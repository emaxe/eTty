<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eTty</title>
</head>
<body>
  <div id="titlebar">
    <div id="toolbar">
      <button id="btn-toggle-sidebar" title="Показать/скрыть боковую панель"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><line x1="5.5" y1="2.5" x2="5.5" y2="13.5"/></svg></button>
      <button id="btn-settings" title="Настройки"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7"/></svg></button>
    </div>
    <div class="toolbar-separator"></div>
    <div id="tab-bar">
      <button id="tab-add">+</button>
    </div>
  </div>
  <div id="workspace">
    <div id="sidebar">
      <div id="sidebar-nav">
        <button id="btn-up" title="На уровень выше">↑</button>
        <button id="btn-home" title="Домашняя директория">~</button>
        <button id="btn-toggle-hidden" title="Показать скрытые файлы"></button>
      </div>
      <div id="file-tree-container"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="terminal-container"></div>
  </div>
  <script type="module" src="./index.js"></script>
</body>
</html>
