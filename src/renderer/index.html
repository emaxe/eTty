<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eTty</title>
</head>
<body>
  <div id="titlebar">
    <div id="toolbar">
      <button id="btn-toggle-sidebar" title="Показать/скрыть боковую панель"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><line x1="5.5" y1="2.5" x2="5.5" y2="13.5"/></svg></button>
      <button id="btn-settings" title="Настройки"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.8 2h2.4l.4 1.7.6.3 1.6-.7 1.7 1.7-.7 1.6.3.6 1.7.4v2.4l-1.7.4-.3.6.7 1.6-1.7 1.7-1.6-.7-.6.3-.4 1.7H6.8l-.4-1.7-.6-.3-1.6.7-1.7-1.7.7-1.6-.3-.6L1.2 9.2V6.8l1.7-.4.3-.6-.7-1.6 1.7-1.7 1.6.7.6-.3z"/><circle cx="8" cy="8" r="2.2"/></svg></button>
      <button id="btn-toggle-editor" title="Редактор файлов"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><line x1="10.5" y1="2.5" x2="10.5" y2="13.5"/><line x1="4" y1="6" x2="8" y2="6"/><line x1="4" y1="8.5" x2="8" y2="8.5"/><line x1="4" y1="11" x2="7" y2="11"/></svg></button>
    </div>
    <div class="toolbar-separator"></div>
    <div id="tab-bar">
      <button id="tab-add">+</button>
    </div>
  </div>
  <div id="workspace">
    <div id="sidebar">
      <div id="sidebar-nav">
        <button id="btn-up" title="На уровень выше">↑</button>
        <button id="btn-home" title="Домашняя директория">~</button>
        <button id="btn-toggle-hidden" title="Показать скрытые файлы"></button>
      </div>
      <div id="file-tree-container"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="terminal-container"></div>
    <div id="resize-handle-right" class="hidden"></div>
    <div id="editor-panel" class="hidden">
      <div id="editor-header">
        <div id="editor-tab-bar"></div>
        <div id="editor-toolbar">
          <button id="btn-open-external" title="Открыть во внешнем редакторе"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/><polyline points="10,2 14,2 14,6"/><line x1="14" y1="2" x2="8" y2="8"/></svg></button>
          <button id="btn-close-editor" title="Закрыть панель редактора"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></button>
        </div>
      </div>
      <div id="editor-body">
        <button id="btn-send-lines-float" title="Отправить строки в терминал" style="display:none"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="13" y1="8" x2="3" y2="8"/><polyline points="7,4 3,8 7,12"/><line x1="13" y1="4" x2="13" y2="12" stroke-width="1.4" stroke-dasharray="1.5 1.5"/></svg></button>
      </div>
      <div id="editor-status">
        <span id="editor-status-file"></span>
        <span id="editor-status-pos"></span>
        <span id="editor-status-modified"></span>
      </div>
    </div>
  </div>
  <div id="status-bar">
    <button id="btn-git-diff" class="status-bar-btn hidden">± +0 -0</button>
  </div>
  <div id="git-overlay" class="hidden">
    <div class="git-header">
      <span class="git-title">Git</span>
      <div class="git-branch-controls">
        <select id="git-branch-select"></select>
        <button id="git-branch-new">+ New</button>
        <button id="git-branch-delete">🗑</button>
      </div>
      <button class="git-close">✕</button>
    </div>
    <div id="git-root-path"></div>
    <div class="git-error" id="git-error-bar"></div>
    <div class="git-actions">
      <input type="text" id="git-commit-msg" placeholder="commit message...">
      <button id="git-btn-commit">Commit</button>
      <button id="git-btn-push">Push</button>
      <button id="git-btn-discard">Discard all</button>
    </div>
    <div class="git-file-list" id="git-file-list"></div>
  </div>
  <script type="module" src="./index.js"></script>
</body>
</html>
