<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eTty</title>
</head>
<body>
  <div id="titlebar">
    <div id="toolbar">
      <button id="btn-toggle-sidebar" title="Показать/скрыть боковую панель">☰</button>
    </div>
    <div id="tab-bar">
      <button id="tab-add">+</button>
    </div>
  </div>
  <div id="workspace">
    <div id="sidebar">
      <div id="sidebar-nav">
        <button id="btn-up" title="На уровень выше">↑</button>
        <button id="btn-home" title="Домашняя директория">~</button>
        <button id="btn-toggle-hidden" title="Показать скрытые файлы">.*</button>
      </div>
      <div id="file-tree-container"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="terminal-container"></div>
  </div>
  <script type="module" src="./index.js"></script>
</body>
</html>
